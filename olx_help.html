    function isTimeInRange(startHour, endHour) {
        var date = new Date();
        var options = {
            timeZone: "Europe/Warsaw",
            hour: "numeric",
            hour12: false,
        };
        var formatter = new Intl.DateTimeFormat("pl-PL", options);
        var timeInTimeZone = formatter.format(date);
        return timeInTimeZone >= startHour && timeInTimeZone < endHour;
    }

<script>
  var grecaptchaReady = false;
  var grecaptchaQueue = [];

  function onloadCallback() {
    grecaptchaReady = true;
    grecaptchaQueue.forEach(function (item) {
      renderRecaptcha(item);
    });
    grecaptchaQueue = [];
  }

  function verifyCallback(token) {
    document.dispatchEvent(new CustomEvent('grecaptchaVerified', {
      detail: { response: token }
    }));
  }

  function expireCallback() {
    document.dispatchEvent(new CustomEvent('grecaptchaExpired'));
  }

  function errorCallback() {
    document.dispatchEvent(new CustomEvent('grecaptchaError'));
  }

  function renderRecaptcha(detail) {
    grecaptcha.render(detail.element, {
      sitekey: window.location.href.includes('sandbox')
        ? '6LdzejgpAAAAAG4szu2nP-RKCBnAzwJOJjaI6fTw'
        : '6LfZ7v4mAAAAAA9npOcPOdoPSg4oTTp4-Sdh6LCU',

      'expired-callback': expireCallback,
      'error-callback': errorCallback
    });
  }

  document.addEventListener('grecaptchaRender', function (e) {
    if (grecaptchaReady && window.grecaptcha) {
      renderRecaptcha(e.detail);
    } else {
      grecaptchaQueue.push(e.detail);
    }
  });

  document.addEventListener('grecaptchaReset', function () {
    if (window.grecaptcha) {
      grecaptcha.reset();
    }

      $recaptcha.setAttribute('required', 'required');
