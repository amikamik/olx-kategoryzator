name: 🏷️ Kategoryzacja OLX - Deal BL B2B (Gemini)

on:
  workflow_dispatch:
    inputs:
      gemini_model:
        description: 'Model Gemini do kategoryzacji'
        required: true
        default: 'gemini-2.5-pro'
        type: choice
        options:
          - gemini-2.5-pro
          - gemini-2.5-flash
          - gemini-2.5-flash-lite
          - gemini-3-pro-preview
          - gemini-3-flash-preview
      oracle_model:
        description: 'Model Oracle do kategoryzacji (tylko gałęzie *_oracle)'
        required: true
        default: 'google.gemini-2.5-flash'
        type: choice
        options:
          - google.gemini-2.5-flash
          - google.gemini-2.5-pro
          - meta.llama-3.1-405b-instruct
      sample_size:
        description: 'Liczba produktów do przetworzenia (0 = wszystkie)'
        required: false
        default: '5'
        type: string
      reset_state:
        description: 'Wyczyść pliki state przed startem?'
        required: false
        default: false
        type: boolean
      refresh_feed:
        description: 'Pobierz feed na nowo z BaseLinker przed przetwarzaniem?'
        required: false
        default: true
        type: boolean
      min_price:
        description: 'Od jakiej ceny (zł) przetwarzać produkty z feedu?'
        required: false
        default: '1'
        type: string
      max_price:
        description: 'Do jakiej ceny (zł) przetwarzać produkty z feedu?'
        required: false
        default: '150'
        type: string

permissions:
  contents: write

jobs:
  kategoryzuj:
    name: Kategoryzacja - Deal BL B2B (Gemini)
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: 📡 Pobierz kod z repozytorium
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Konfiguracja Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 📦 Instalacja zależności
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🧭 Ustal tryb gałęzi (legacy vs _oracle)
        id: branch_mode
        run: |
          if [[ "${{ github.ref_name }}" == *_oracle ]]; then
            echo "is_oracle=true" >> $GITHUB_OUTPUT
            echo "provider=ORACLE" >> $GITHUB_OUTPUT
            echo "selected_model=${{ inputs.oracle_model }}" >> $GITHUB_OUTPUT
            echo "source_branch=${GITHUB_REF_NAME%_oracle}" >> $GITHUB_OUTPUT
          else
            echo "is_oracle=false" >> $GITHUB_OUTPUT
            echo "provider=GEMINI" >> $GITHUB_OUTPUT
            echo "selected_model=${{ inputs.gemini_model }}" >> $GITHUB_OUTPUT
            echo "source_branch=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: 📥 Pobierz wspólny state z deal-shared-state (legacy)
        if: ${{ steps.branch_mode.outputs.is_oracle != 'true' }}
        run: |
          echo "📥 Pobieram wspólny state z gałęzi deal-shared-state..."
          git fetch origin deal-shared-state
          git checkout origin/deal-shared-state -- state/ || echo "⚠️ Brak state na deal-shared-state, używam lokalnego"
          echo "📋 Wspólny state pobrany:"
          for f in state/*.json; do
            if [ -f "$f" ]; then
              COUNT=$(python3 -c "import json; d=json.load(open('$f')); print(len(d))" 2>/dev/null || echo "?")
              echo "  $(basename $f): $COUNT elementów"
            fi
          done

      - name: 🧷 Bootstrap state z gałęzi źródłowej (oracle)
        if: ${{ steps.branch_mode.outputs.is_oracle == 'true' }}
        run: |
          mkdir -p state
          if [ -z "$(ls -A state 2>/dev/null)" ]; then
            echo "📥 Brak lokalnego state - bootstrap z: ${{ steps.branch_mode.outputs.source_branch }}"
            git fetch origin "${{ steps.branch_mode.outputs.source_branch }}"
            git checkout "origin/${{ steps.branch_mode.outputs.source_branch }}" -- state/ || echo "⚠️ Brak state w gałęzi źródłowej"
          else
            echo "ℹ️ State już istnieje na gałęzi _oracle - pomijam bootstrap"
          fi

          echo "📋 State na starcie (_oracle):"
          for f in state/*.json; do
            if [ -f "$f" ]; then
              COUNT=$(python3 -c "import json; d=json.load(open('$f')); print(len(d))" 2>/dev/null || echo "?")
              echo "  $(basename $f): $COUNT elementów"
            fi
          done

      - name: �🗑️ Reset plików state (opcjonalnie)
        if: ${{ inputs.reset_state == true }}
        run: |
          echo "Czyszczenie plików state..."
          rm -f state/*.json
          echo "Pliki state wyczyszczone"

      - name: 🔄 Odświeżenie tokena OLX
        id: refresh_token
        run: |
          echo "🔄 Odświeżanie tokena OLX..."
          NEW_TOKEN=$(python scripts/refresh_token.py)
          if [ $? -eq 0 ] && [ ! -z "$NEW_TOKEN" ]; then
            echo "✅ Token odświeżony pomyślnie"
            echo "::add-mask::$NEW_TOKEN"
            echo "REFRESHED_OLX_TOKEN=$NEW_TOKEN" >> $GITHUB_ENV
          else
            echo "⚠️ Błąd odświeżania - używam tokena z secrets"
            echo "REFRESHED_OLX_TOKEN=${{ secrets.OLX_ACCESS_TOKEN }}" >> $GITHUB_ENV
          fi
        env:
          OLX_CLIENT_ID: "202557"
          OLX_CLIENT_SECRET: "Ac1gaT97w4uTXf6vgtfaAOTZUKNucyPiEPshs2UoTGubjRpY"
          OLX_REFRESH_TOKEN: "${{ secrets.OLX_REFRESH_TOKEN }}"

      - name: ⚙️ Przygotuj konfigurację (GEMINI - legacy)
        if: ${{ steps.branch_mode.outputs.is_oracle != 'true' }}
        run: |
          cat > config/config.py << EOF
          import os

          # --- GEMINI JAKO GŁÓWNY PROVIDER ---
          ACTIVE_LLM_PROVIDER = "GEMINI"

          # --- Konfiguracja Gemini ---
          GEMINI_API_KEY = "${{ secrets.GEMINI_API_KEY }}"
          GEMINI_MODEL_NAME = "${{ inputs.gemini_model }}"
          GEMINI_TEMPERATURE = 1.0

          # --- Konfiguracja OpenAI (do zadań pomocniczych) ---
          OPENAI_API_KEY = "${{ secrets.OPENAI_API_KEY }}"
          OPENAI_MODEL_NAME = "gpt-5-nano"
          OPENAI_TEMPERATURE = 1.0

          # --- Konfiguracja DeepSeek (backup) ---
          DEEPSEEK_API_KEY = "${{ secrets.DEEPSEEK_API_KEY }}"

          # Modele dla różnych zadań:
          CATEGORIZATION_MODEL = "${{ inputs.gemini_model }}"  # Model używany do kategoryzacji produktów
          OTHER_TASKS_MODEL = "gpt-5-nano"  # Model używany do rozmiaru paczek, atrybutów, itp.

          # --- Konfiguracja OLX ---
          CLIENT_ID = "202557"
          CLIENT_SECRET = "Ac1gaT97w4uTXf6vgtfaAOTZUKNucyPiEPshs2UoTGubjRpY"
          ACCESS_TOKEN = "${REFRESHED_OLX_TOKEN}"
          REFRESH_TOKEN = "8bf78bbca8df822b188fdde14df9a468fb28be23"

          # Dane kontaktowe
          OLX_AD_CONTACT = {
              "name": "Amadeusz",
              "phone": "530790357"
          }

          OLX_AD_LOCATION = {
              "city_id": 20327,
              "district_id": None
          }

          # --- Konfiguracja cenowa ---
          MARGIN_PERCENT = 0.30
          COMMISSION_PERCENT = 0.12
          MINIMUM_PROFIT_PLN = 11.0
          CENA_MIN = float(${{ inputs.min_price }})
          CENA_MAX = float(${{ inputs.max_price }})

          # --- Parametry kategoryzacji ---
          MINIMALNA_PEWNOSC = 80

          # Cache dla drzewa kategorii (wypełniane dynamicznie)
          CATEGORY_TREE_JSON_STR = ""

          # GPSR - Deal nie ma danych GPSR
          GPSR_ENABLED = False

          # BaseLinker (do pobierania feedu Deal)
          BASELINKER_TOKEN = "${{ secrets.BASELINKER_TOKEN }}"

          # Dedykowane konto BL z pełnym feedem Deal (bez limitu 1000)
          BASELINKER_TOKEN_FEED = "${{ secrets.BASELINKER_TOKEN_FEED }}"
          EOF
        env:
          OLX_ACCESS_TOKEN: ${{ secrets.OLX_ACCESS_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: ⚙️ Przygotuj konfigurację (ORACLE)
        if: ${{ steps.branch_mode.outputs.is_oracle == 'true' }}
        run: |
          cat > config/config.py << EOF
          import os

          # --- ORACLE JAKO GŁÓWNY PROVIDER ---
          ACTIVE_LLM_PROVIDER = "ORACLE"

          # --- Konfiguracja Oracle OCI GenAI ---
          ORACLE_REGION = os.environ.get("OCI_REGION", "eu-frankfurt-1")
          ORACLE_TENANCY_OCID = os.environ.get("OCI_TENANCY_OCID", "")
          ORACLE_USER_OCID = os.environ.get("OCI_USER_OCID", "")
          ORACLE_FINGERPRINT = os.environ.get("OCI_FINGERPRINT", "")
          ORACLE_PRIVATE_KEY = os.environ.get("OCI_PRIVATE_KEY", "")
          ORACLE_PRIVATE_KEY_PASSPHRASE = os.environ.get("OCI_PRIVATE_KEY_PASSPHRASE", "")
          ORACLE_COMPARTMENT_ID = os.environ.get("OCI_COMPARTMENT_ID", ORACLE_TENANCY_OCID)
          ORACLE_INFERENCE_URL = f"https://inference.generativeai.{ORACLE_REGION}.oci.oraclecloud.com/20231130/actions/chat"
          ORACLE_MODEL_NAME = "${{ inputs.oracle_model }}"
          ORACLE_TEMPERATURE = 0.7
          ORACLE_MAX_TOKENS = 4000

          # --- Konfiguracja Gemini (zachowana pomocniczo) ---
          GEMINI_API_KEY = "${{ secrets.GEMINI_API_KEY }}"
          GEMINI_MODEL_NAME = "${{ inputs.gemini_model }}"
          GEMINI_TEMPERATURE = 1.0

          # --- Konfiguracja OpenAI (do zadań pomocniczych) ---
          OPENAI_API_KEY = "${{ secrets.OPENAI_API_KEY }}"
          OPENAI_MODEL_NAME = "gpt-5-nano"
          OPENAI_TEMPERATURE = 1.0

          # --- Konfiguracja DeepSeek (backup) ---
          DEEPSEEK_API_KEY = "${{ secrets.DEEPSEEK_API_KEY }}"

          # Modele dla różnych zadań:
          CATEGORIZATION_MODEL = "${{ inputs.oracle_model }}"
          OTHER_TASKS_MODEL = "gpt-5-nano"

          # --- Konfiguracja OLX ---
          CLIENT_ID = "202557"
          CLIENT_SECRET = "Ac1gaT97w4uTXf6vgtfaAOTZUKNucyPiEPshs2UoTGubjRpY"
          ACCESS_TOKEN = "${REFRESHED_OLX_TOKEN}"
          REFRESH_TOKEN = "8bf78bbca8df822b188fdde14df9a468fb28be23"

          # Dane kontaktowe
          OLX_AD_CONTACT = {
              "name": "Amadeusz",
              "phone": "530790357"
          }

          OLX_AD_LOCATION = {
              "city_id": 20327,
              "district_id": None
          }

          # --- Konfiguracja cenowa ---
          MARGIN_PERCENT = 0.30
          COMMISSION_PERCENT = 0.12
          MINIMUM_PROFIT_PLN = 11.0
          CENA_MIN = float(${{ inputs.min_price }})
          CENA_MAX = float(${{ inputs.max_price }})

          # --- Parametry kategoryzacji ---
          MINIMALNA_PEWNOSC = 80

          # Cache dla drzewa kategorii (wypełniane dynamicznie)
          CATEGORY_TREE_JSON_STR = ""

          # GPSR - Deal nie ma danych GPSR
          GPSR_ENABLED = False

          # BaseLinker (do pobierania feedu Deal)
          BASELINKER_TOKEN = "${{ secrets.BASELINKER_TOKEN }}"

          # Dedykowane konto BL z pełnym feedem Deal (bez limitu 1000)
          BASELINKER_TOKEN_FEED = "${{ secrets.BASELINKER_TOKEN_FEED }}"
          EOF
        env:
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_PRIVATE_KEY_PASSPHRASE: ${{ secrets.OCI_PRIVATE_KEY_PASSPHRASE }}
          OCI_COMPARTMENT_ID: ${{ secrets.OCI_COMPARTMENT_ID }}

      - name: 🏷️ Uruchom kategoryzator - Deal BL B2B
        run: |
          echo "=================================="
          echo "KATEGORYZACJA OLX - DEAL BL B2B"
          echo "Provider: ${{ steps.branch_mode.outputs.provider }}"
          echo "Model: ${{ steps.branch_mode.outputs.selected_model }}"
          echo "Sample size: ${{ inputs.sample_size }}"
          echo "Zakres cenowy: ${{ inputs.min_price }} - ${{ inputs.max_price }} zł"
          echo "Refresh feed: ${{ inputs.refresh_feed }}"
          echo "=================================="
          echo ""

          mkdir -p output
          mkdir -p state

          sed -i "s/SAMPLE_SIZE = .*/SAMPLE_SIZE = ${{ inputs.sample_size }}/" 08_kategoryzator_ekspert.py

          if [ "${{ inputs.refresh_feed }}" == "true" ]; then
            python -u 08_kategoryzator_ekspert.py --refresh-feed
          else
            python -u 08_kategoryzator_ekspert.py
          fi
        env:
          PYTHONUNBUFFERED: "1"
          OLX_ACCESS_TOKEN: ${{ secrets.OLX_ACCESS_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          BASELINKER_TOKEN: ${{ secrets.BASELINKER_TOKEN }}
          BASELINKER_TOKEN_FEED: ${{ secrets.BASELINKER_TOKEN_FEED }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_PRIVATE_KEY_PASSPHRASE: ${{ secrets.OCI_PRIVATE_KEY_PASSPHRASE }}
          OCI_COMPARTMENT_ID: ${{ secrets.OCI_COMPARTMENT_ID }}
          MAX_RUNTIME_MINUTES: "350"

      - name: 💽 Zapisz zaktualizowane pliki state i raport
        if: always()
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add state/*.json
          git add output/raport_kategoryzacji.csv

          if ! git diff --staged --quiet; then
            git commit -m "AUTO: Aktualizacja state i raport - Deal BL B2B - ${{ steps.branch_mode.outputs.provider }} ${{ steps.branch_mode.outputs.selected_model }} - $(date '+%Y-%m-%d %H:%M:%S')"
            git push
            echo "✅ Zaktualizowano pliki state i raport"
          else
            echo "ℹ️  Brak zmian w plikach"
          fi

      - name: 📤 Wypchnij state na deal-shared-state
        if: ${{ always() && steps.branch_mode.outputs.is_oracle != 'true' }}
        run: |
          echo "📤 Aktualizuję wspólny state na deal-shared-state..."
          
          # Zapisz aktualny state do tmp
          mkdir -p /tmp/shared_state
          cp state/*.json /tmp/shared_state/ 2>/dev/null || true
          
          # Użyj git worktree — NIE przełącza brancha, działa równolegle
          git fetch origin deal-shared-state
          git worktree add /tmp/shared_worktree origin/deal-shared-state
          
          # Merguj state w worktree (Python merge — nie nadpisuj, merguj listy i dict)
          cd /tmp/shared_worktree
          python3 -c "
          import json, os, glob
          for src in glob.glob('/tmp/shared_state/*.json'):
              fname = os.path.basename(src)
              dst = f'state/{fname}'
              try:
                  with open(src, 'r') as f:
                      new_data = json.load(f)
              except: continue
              try:
                  with open(dst, 'r') as f:
                      old_data = json.load(f)
              except: old_data = type(new_data)()
              
              if isinstance(new_data, dict) and isinstance(old_data, dict):
                  old_data.update(new_data)
                  merged = old_data
              elif isinstance(new_data, list) and isinstance(old_data, list):
                  seen = set()
                  merged = []
                  for item in old_data + new_data:
                      key = json.dumps(item, sort_keys=True) if isinstance(item, dict) else str(item)
                      if key not in seen:
                          seen.add(key)
                          merged.append(item)
              else:
                  merged = new_data
              
              with open(dst, 'w') as f:
                  json.dump(merged, f, indent=4, ensure_ascii=False)
              print(f'  {fname}: {len(merged)} elementów')
          "
          
          git add state/*.json
          if ! git diff --staged --quiet; then
            git commit -m "AUTO: Shared state update from ${{ github.ref_name }} - $(date '+%Y-%m-%d %H:%M:%S')"
            
            # Retry push (na wypadek równoległego zapisu z innej gałęzi)
            for i in 1 2 3; do
              if git push origin HEAD:deal-shared-state; then
                echo "✅ Wspólny state zaktualizowany (próba $i)"
                break
              else
                echo "⚠️ Push failed, retry $i/3..."
                git pull --rebase origin deal-shared-state
                sleep $((i * 5))
              fi
            done
          else
            echo "ℹ️  Brak zmian w wspólnym state"
          fi
          
          # Cleanup worktree
          cd $GITHUB_WORKSPACE
          git worktree remove /tmp/shared_worktree --force 2>/dev/null || true

      - name: 🔄 Auto-restart jeśli osiągnięto limit czasu (WYŁĄCZONY)
        if: false  # WYŁĄCZONY - przywróć always() żeby włączyć
        run: |
          if [ -f "RESTART_NEEDED" ]; then
            REMAINING=$(cat RESTART_NEEDED)
            echo "🔄 Wykryto potrzebę restartu - pozostało ~$REMAINING produktów"
            echo "🔄 Uruchamiam workflow ponownie za 30 sekund..."
            sleep 30

            curl -X POST \
              -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
              -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/${{ github.repository }}/actions/workflows/kategoryzator.yml/dispatches \
              -d "{\"ref\":\"${{ github.ref_name }}\",\"inputs\":{\"gemini_model\":\"${{ inputs.gemini_model }}\",\"sample_size\":\"${{ inputs.sample_size }}\",\"reset_state\":\"false\",\"min_price\":\"${{ inputs.min_price }}\",\"max_price\":\"${{ inputs.max_price }}\"}}"

            echo "✅ Workflow został ponownie uruchomiony"
          else
            echo "✅ Wszystkie produkty przetworzone - brak potrzeby restartu"
          fi

      - name: 📊 Upload raportu CSV
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: raport-kategoryzacji-deal-gemini
          path: output/raport_kategoryzacji.csv
          if-no-files-found: ignore

      - name: 📊 Upload plików state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: state-files-deal-gemini
          path: state/*.json
          if-no-files-found: ignore

      - name: 📊 Podsumowanie
        if: always()
        run: |
          echo ""
          echo "=================================="
          echo "✅ Workflow zakończony - Deal BL B2B"
          echo "🤖 Provider: ${{ steps.branch_mode.outputs.provider }}"
          echo "🤖 Model: ${{ steps.branch_mode.outputs.selected_model }}"
          echo "📅 Czas zakończenia: $(date)"
          echo "=================================="

          if [ -f "output/raport_kategoryzacji.csv" ]; then
            echo ""
            echo "📊 Statystyki:"
            wc -l output/raport_kategoryzacji.csv
          fi

          if [ -f "state/opublikowane.json" ]; then
            echo ""
            echo "✅ Opublikowane produkty:"
            cat state/opublikowane.json | jq '. | length' || echo "Nie można odczytać"
          fi

          if [ -f "state/bez_gpsr.json" ]; then
            echo ""
            echo "⚠️ Produkty BEZ GPSR:"
            cat state/bez_gpsr.json | jq '. | length' || echo "Nie można odczytać"
          fi
