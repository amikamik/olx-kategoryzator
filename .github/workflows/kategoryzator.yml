name: 🏷️ Kategoryzacja i Publikacja OLX

on:
  workflow_dispatch:
    inputs:
      sample_size:
        description: 'Liczba produktów do przetworzenia (0 = wszystkie)'
        required: false
        default: '5'
        type: string
      reset_state:
        description: 'Wyczyść pliki state przed startem?'
        required: false
        default: false
        type: boolean

jobs:
  kategoryzuj:
    name: Kategoryzacja i publikacja
    runs-on: ubuntu-latest
    timeout-minutes: 180  # 3h max
    
    steps:
      - name: 📥 Pobierz kod z repozytorium
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Potrzebne do commitowania zmian

      - name: 🐍 Konfiguracja Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 📦 Instalacja zależności
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🗑️ Reset plików state (opcjonalnie)
        if: ${{ inputs.reset_state == true }}
        run: |
          echo "Czyszczenie plików state..."
          rm -f state/*.json
          echo "Pliki state wyczyszczone"

      - name: ⚙️ Przygotuj konfigurację z secretów
        run: |
          cat > config/config.py << 'EOF'
          import os
          
          # --- Konfiguracja globalna ---
          ACTIVE_LLM_PROVIDER = "OPENAI"
          
          # --- Konfiguracja Gemini ---
          GEMINI_API_KEY = "AIzaSyA3eSK_cwRKCEzys_4EY4OrIvpdda5eIc0"
          GEMINI_MODEL_NAME = "gemini-2.5-flash"
          GEMINI_TEMPERATURE = 0.0
          
          # --- Konfiguracja OpenAI ---
          OPENAI_API_KEY = os.environ.get('OPENAI_API_KEY', '')
          OPENAI_MODEL_NAME = "gpt-5-nano"
          OPENAI_TEMPERATURE = 1.0
          
          # --- Konfiguracja OLX ---
          CLIENT_ID = "202557"
          CLIENT_SECRET = "Ac1gaT97w4uTXf6vgtfaAOTZUKNucyPiEPshs2UoTGubjRpY"
          ACCESS_TOKEN = os.environ.get('OLX_ACCESS_TOKEN', '')
          REFRESH_TOKEN = "8bf78bbca8df822b188fdde14df9a468fb28be23"
          
          # Dane kontaktowe
          OLX_AD_CONTACT = {
              "name": "Amadeusz",
              "phone": "530790357"
          }
          
          OLX_AD_LOCATION = {
              "city_id": 20327,
              "district_id": None
          }
          
          # --- Konfiguracja cenowa ---
          MARGIN_PERCENT = 0.20
          COMMISSION_PERCENT = 0.12
          MINIMUM_PROFIT_PLN = 10.0
          CENA_MIN = 50
          CENA_MAX = 500
          
          # Cache dla drzewa kategorii (wypełniane dynamicznie)
          CATEGORY_TREE_JSON_STR = ""
          EOF
        env:
          OLX_ACCESS_TOKEN: ${{ secrets.OLX_ACCESS_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: 🏷️ Uruchom kategoryzator
        run: |
          echo "=================================="
          echo "KATEGORYZACJA I PUBLIKACJA OLX"
          echo "Sample size: ${{ inputs.sample_size }}"
          echo "=================================="
          echo ""
          
          # Modyfikacja SAMPLE_SIZE w skrypcie
          sed -i "s/SAMPLE_SIZE = .*/SAMPLE_SIZE = ${{ inputs.sample_size }}/" 08_kategoryzator_ekspert.py
          
          python 08_kategoryzator_ekspert.py
        env:
          OLX_ACCESS_TOKEN: ${{ secrets.OLX_ACCESS_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: 💾 Zapisz zaktualizowane pliki state
        if: always()
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add state/*.json
          
          # Commit tylko jeśli są zmiany
          if ! git diff --staged --quiet; then
            git commit -m "AUTO: Aktualizacja state po kategoryzacji - $(date '+%Y-%m-%d %H:%M:%S')"
            git push
            echo "✅ Zaktualizowano pliki state"
          else
            echo "ℹ️  Brak zmian w plikach state"
          fi

      - name: 📊 Upload raportu CSV
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: raport-kategoryzacji
          path: output/raport_kategoryzacji.csv
          if-no-files-found: ignore

      - name: 📊 Upload plików state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: state-files
          path: state/*.json
          if-no-files-found: ignore

      - name: 📊 Podsumowanie
        if: always()
        run: |
          echo ""
          echo "=================================="
          echo "✅ Workflow zakończony"
          echo "📅 Czas zakończenia: $(date)"
          echo "=================================="
          
          if [ -f "output/raport_kategoryzacji.csv" ]; then
            echo ""
            echo "📊 Statystyki:"
            wc -l output/raport_kategoryzacji.csv
          fi
          
          if [ -f "state/opublikowane.json" ]; then
            echo ""
            echo "✅ Opublikowane produkty:"
            cat state/opublikowane.json | jq '. | length' || echo "Nie można odczytać"
          fi
