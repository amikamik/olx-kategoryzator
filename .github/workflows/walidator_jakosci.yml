name: 🔍 Walidator Jakości Kategoryzacji

# Uruchamianie:
# - Tylko ręcznie: workflow_dispatch
# - Po uruchomieniu czeka aż będzie ≥120 produktów, potem wykonuje walidację
on:
  workflow_dispatch:  # Tylko ręczne uruchomienie

# Ochrona przed równoczesnymi uruchomieniami
concurrency:
  group: walidator-jakosci
  cancel-in-progress: false  # Czekaj na zakończenie, nie przerywaj

permissions:
  contents: write

jobs:
  walidacja:
    name: Walidacja kategoryzacji
    runs-on: ubuntu-latest
    timeout-minutes: 300  # 5h max
    
    steps:
      - name: 📥 Pobierz kod z repozytorium
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🐍 Konfiguracja Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 📦 Instalacja zależności
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: ⚙️ Przygotuj konfigurację z secretów
        run: |
          cat > config/config.py << EOF
          import os
          
          # --- Konfiguracja globalna ---
          ACTIVE_LLM_PROVIDER = "DEEPSEEK"
          
          # --- Konfiguracja Gemini ---
          GEMINI_API_KEY = "AIzaSyA3eSK_cwRKCEzys_4EY4OrIvpdda5eIc0"
          GEMINI_MODEL_NAME = "gemini-2.5-flash"
          GEMINI_TEMPERATURE = 0.0
          
          # --- Konfiguracja OpenAI ---
          OPENAI_API_KEY = "${{ secrets.OPENAI_API_KEY }}"
          OPENAI_MODEL_NAME = "gpt-5-nano"
          OPENAI_TEMPERATURE = 1.0
          
          # --- Konfiguracja DeepSeek ---
          DEEPSEEK_API_KEY = "${{ secrets.DEEPSEEK_API_KEY }}"
          DEEPSEEK_MODEL_NAME = "deepseek-reasoner"
          DEEPSEEK_TEMPERATURE = 1.0
          
          # Modele dla różnych zadań:
          CATEGORIZATION_MODEL = "deepseek-reasoner"
          OTHER_TASKS_MODEL = "gpt-5-nano"
          
          # --- Konfiguracja OLX ---
          CLIENT_ID = "202557"
          CLIENT_SECRET = "Ac1gaT97w4uTXf6vgtfaAOTZUKNucyPiEPshs2UoTGubjRpY"
          ACCESS_TOKEN = "${{ secrets.OLX_ACCESS_TOKEN }}"
          REFRESH_TOKEN = "8bf78bbca8df822b188fdde14df9a468fb28be23"
          
          # Dane kontaktowe
          OLX_AD_CONTACT = {
              "name": "Amadeusz",
              "phone": "530790357"
          }
          
          OLX_AD_LOCATION = {
              "city_id": 20327,
              "district_id": None
          }
          
          # --- Konfiguracja cenowa ---
          MARGIN_PERCENT = 0.20
          COMMISSION_PERCENT = 0.12
          MINIMUM_PROFIT_PLN = 10.0
          CENA_MIN = 1.0
          CENA_MAX = 50.0
          
          # --- Parametry kategoryzacji ---
          MINIMALNA_PEWNOSC = 80
          
          # Cache dla drzewa kategorii
          CATEGORY_TREE_JSON_STR = ""
          EOF
        env:
          OLX_ACCESS_TOKEN: ${{ secrets.OLX_ACCESS_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: ⏳ Czekaj na ≥120 produktów niesprawdzonych
        id: wait
        run: |
          echo "🔍 Czekam aż zbierze się ≥120 produktów do walidacji..."
          echo ""
          
          if [ ! -f "state/mapping_feed_to_olx.json" ]; then
            echo "❌ Brak pliku mapping_feed_to_olx.json"
            exit 1
          fi
          
          # Pętla czekania (max 2h przez timeout workflow)
          while true; do
            # Policz produkty bez "tested": true
            UNTESTED=$(python3 -c 'import json; data=json.load(open("state/mapping_feed_to_olx.json","r",encoding="utf-8")); print(len([k for k,v in data.items() if not v.get("tested",False)]))')
            
            if [ "$UNTESTED" -ge 120 ]; then
              echo ""
              echo "✅ Znaleziono $UNTESTED produktów - uruchamiam walidację!"
              echo "should_run=true" >> $GITHUB_OUTPUT
              break
            fi
            
            echo "⏳ Produktów: $UNTESTED/120 - czekam 60s..."
            sleep 60
          done

      - name: 🔍 Uruchom walidator jakości
        if: steps.wait.outputs.should_run == 'true'
        run: |
          echo "=================================="
          echo "WALIDATOR JAKOŚCI KATEGORYZACJI"
          echo "=================================="
          echo ""
          
          python 09_walidator_jakosci.py
        env:
          OLX_ACCESS_TOKEN: ${{ secrets.OLX_ACCESS_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: 💾 Zapisz zaktualizowane pliki state
        if: steps.wait.outputs.should_run == 'true'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          
          # Dodaj state i logi
          git add state/*.json
          git add logs/walidator_runs/*.log
          
          # Commit tylko jeśli są zmiany
          if ! git diff --staged --quiet; then
            git commit -m "AUTO: Walidator - aktualizacja state + logs - $(date '+%Y-%m-%d %H:%M:%S')"
            
            # Git push z rebase i retry (3 próby)
            for i in 1 2 3; do
              echo "🔄 Próba push #$i..."
              git pull --rebase origin main && git push && break || {
                if [ $i -lt 3 ]; then
                  echo "⚠️  Push failed, retry in 5s..."
                  sleep 5
                else
                  echo "❌ Push failed after 3 attempts"
                  exit 1
                fi
              }
            done
            
            echo "✅ Zaktualizowano pliki state + logs"
          else
            echo "ℹ️  Brak zmian w plikach"
          fi

      - name: 📊 Upload artifacts
        if: always() && steps.wait.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: walidator-state-${{ github.run_number }}
          path: |
            state/mapping_feed_to_olx.json
            state/usuniete_problematyczne.json
            state/walidator_history.json
            logs/walidator_runs/*.log
            test_iteracyjny/wyniki_nondet_run2_copy*/podsumowanie.json
          if-no-files-found: ignore

      - name: 📊 Podsumowanie
        if: always()
        run: |
          echo ""
          echo "=================================="
          if [ "${{ steps.wait.outputs.should_run }}" == "true" ]; then
            echo "✅ Walidator wykonany"
            
            if [ -f "state/usuniete_problematyczne.json" ]; then
              REMOVED=$(python3 -c "import json; print(len(json.load(open('state/usuniete_problematyczne.json', 'r', encoding='utf-8'))))" 2>/dev/null || echo "0")
              echo "🗑️  Usuniętych produktów: $REMOVED"
            fi
          else
            echo "⏳ Walidator pominięty (za mało produktów)"
          fi
          echo "📅 Czas zakończenia: $(date)"
          echo "=================================="
