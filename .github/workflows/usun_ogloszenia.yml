name: 🗑️ Usuń Deaktywowane Ogłoszenia OLX

# Kiedy uruchomić workflow
on:
  workflow_dispatch:  # Ręczne uruchomienie z GitHub (najlepsze dla Ciebie)
    inputs:
      dry_run:
        description: 'Tryb testowy (true) czy produkcyjny (false)?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  usun-ogloszenia:
    name: Usuwanie ogłoszeń
    runs-on: ubuntu-latest  # Darmowy runner Linuxa
    timeout-minutes: 360    # Max 6 godzin (zabezpieczenie)
    
    steps:
      - name: 📥 Pobierz kod z repozytorium
        uses: actions/checkout@v4
      
      - name: 🐍 Zainstaluj Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: 📦 Zainstaluj zależności
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: 🔄 Odśwież Access Token (automatycznie)
        id: refresh_token
        env:
          OLX_CLIENT_ID: ${{ secrets.OLX_CLIENT_ID }}
          OLX_CLIENT_SECRET: ${{ secrets.OLX_CLIENT_SECRET }}
          OLX_REFRESH_TOKEN: ${{ secrets.OLX_REFRESH_TOKEN }}
        run: |
          echo "🔄 Automatyczne odświeżanie tokena..."
          NEW_ACCESS_TOKEN=$(python scripts/refresh_token.py)
          
          if [ $? -ne 0 ]; then
            echo "❌ Nie udało się odświeżyć tokena!"
            exit 1
          fi
          
          echo "✅ Token odświeżony pomyślnie"
          echo "ACCESS_TOKEN=$NEW_ACCESS_TOKEN" >> $GITHUB_OUTPUT
      
      - name: ⚙️ Przygotuj konfigurację z odświeżonym tokenem
        run: |
          # Stwórz config.py z odświeżonym tokenem
          cat > config/config.py << 'EOF'
          # -*- coding: utf-8 -*-
          """Konfiguracja dla GitHub Actions - TOKEN automatycznie odświeżony"""
          import os
          
          # Token OAuth - automatycznie odświeżony przed uruchomieniem
          ACCESS_TOKEN = os.environ.get('OLX_ACCESS_TOKEN', '')
          
          # Pozostałe ustawienia (nie używane w skrypcie usuwania, ale muszą istnieć)
          CLIENT_ID = "dummy"
          CLIENT_SECRET = "dummy"
          OPENAI_API_KEY = "dummy"
          OPENAI_MODEL_NAME = "gpt-4"
          OPENAI_TEMPERATURE = 1.0
          SAMPLE_SIZE = 0
          EOF
          
          echo "✅ Utworzono config.py z automatycznie odświeżonym tokenem"
      
      - name: 🗑️ Uruchom skrypt usuwania
        env:
          OLX_ACCESS_TOKEN: ${{ steps.refresh_token.outputs.ACCESS_TOKEN }}
        run: |
          echo "🚀 Rozpoczynam usuwanie deaktywowanych ogłoszeń..."
          echo "📅 Data: $(date)"
          echo "🖥️  Runner: ${{ runner.os }}"
          echo ""
          
          python scripts/usun_deaktywowane.py
      
      - name: 📊 Podsumowanie
        if: always()  # Zawsze wykonaj, nawet jeśli poprzedni krok się nie powiódł
        run: |
          echo ""
          echo "=================================="
          echo "✅ Workflow zakończony"
          echo "📅 Czas zakończenia: $(date)"
          echo "=================================="
