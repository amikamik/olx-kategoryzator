name: 🗑️ Usuń Deaktywowane Ogłoszenia OLX

# Kiedy uruchomić workflow
on:
  workflow_dispatch:  # Ręczne uruchomienie z GitHub (najlepsze dla Ciebie)
    inputs:
      dry_run:
        description: 'Tryb testowy (true) czy produkcyjny (false)?'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  usun-ogloszenia:
    name: Usuwanie ogłoszeń
    runs-on: ubuntu-latest  # Darmowy runner Linuxa
    timeout-minutes: 360    # Max 6 godzin (zabezpieczenie)
    
    steps:
      - name: 📥 Pobierz kod z repozytorium
        uses: actions/checkout@v4
      
      - name: 🐍 Zainstaluj Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: 📦 Zainstaluj zależności
        run: |
          python -m pip install --upgrade pip
          pip install requests
      
      - name: ⚙️ Przygotuj konfigurację z ACCESS_TOKEN
        run: |
          # Stwórz config.py z tokenem z GitHub Secrets
          cat > config/config.py << 'EOF'
          # -*- coding: utf-8 -*-
          """Konfiguracja dla GitHub Actions - TOKEN ze zmiennej środowiskowej"""
          import os
          
          # Token OAuth z GitHub Secret
          ACCESS_TOKEN = os.environ.get('OLX_ACCESS_TOKEN', '')
          
          # Pozostałe ustawienia (nie używane w skrypcie usuwania, ale muszą istnieć)
          CLIENT_ID = "dummy"
          CLIENT_SECRET = "dummy"
          OPENAI_API_KEY = "dummy"
          OPENAI_MODEL_NAME = "gpt-4"
          OPENAI_TEMPERATURE = 1.0
          SAMPLE_SIZE = 0
          EOF
          
          echo "✅ Utworzono config.py z tokenem z SECRET"
      
      - name: 🗑️ Uruchom skrypt usuwania
        env:
          OLX_ACCESS_TOKEN: ${{ secrets.OLX_ACCESS_TOKEN }}
        run: |
          echo "🚀 Rozpoczynam usuwanie deaktywowanych ogłoszeń..."
          echo "📅 Data: $(date)"
          echo "🖥️  Runner: ${{ runner.os }}"
          echo ""
          
          python scripts/usun_deaktywowane.py
      
      - name: 📊 Podsumowanie
        if: always()  # Zawsze wykonaj, nawet jeśli poprzedni krok się nie powiódł
        run: |
          echo ""
          echo "=================================="
          echo "✅ Workflow zakończony"
          echo "📅 Czas zakończenia: $(date)"
          echo "=================================="
